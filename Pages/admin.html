<section id="manage-cafes" class="admin-box">

  <h2>Manage Cafes</h2>

<section id="add-cafe" class="admin-box">

  <h2>Add New Cafe</h2>

  <form class="admin-form">

    <input placeholder="Cafe Name">

    <input placeholder="Location">

    <select>
      <option>Study Friendly</option>
      <option>Yes</option>
      <option>No</option>
    </select>

    <input placeholder="WiFi Quality">

    <input placeholder="Rating">

    <input type="file">

    <textarea placeholder="Description"></textarea>

    <button type="submit">
      Add Cafe
    </button>

  </form>

</section>
