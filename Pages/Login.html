<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1.0" />
    <title>Admin Login | Fanjalah</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../css/style.css" />
  </head>
  <body>
    <div class="blur b1"></div>
    <div class="blur b2"></div>

    <header class="nav">
      <div class="brand">
        <div class="logo">☕</div>
        <h2>Fanjalah</h2>
      </div>

      <nav>
        <a href="index.html">Home</a>
        <a href="../IT/Allpage.html">All Cafes</a>
        <a href="index.html#contact">Contact</a>
        <a href="index.html#about">About</a>
      </nav>

      <a href="login.html" class="nav-btn"> Login </a>
    </header>

    <section class="login-page">
      <div class="login-left">
        <h1>Admin Access</h1>
        <p>Login to manage cafes</p>

        <div class="hero-card login-image">
          <img
            src="https://images.unsplash.com/photo-1509042239860-f550ce710b93"
          />
        </div>
      </div>

      <div class="login-box-modern">
        <h2>Welcome Back</h2>

        <form id="loginForm">
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="Enter email" />
          </div>

          <div class="form-group">
            <label>Password</label>
            <input id="password" type="password" placeholder="Enter password" />
          </div>

          <button type="submit" class="login-submit">Login</button>
        </form>
      </div>
    </section>

    <script>
      const form = document.getElementById("loginForm");

      form.addEventListener("submit", function (e) {
        e.preventDefault();

        const email = document.getElementById("email").value.trim();
        const password = document.getElementById("password").value.trim();

        if (email === "" || password === "") {
          alert("Fill all fields");
          return;
        }

        if (email === "admin@fanjalah.com" && password === "1234") {
          localStorage.setItem("auth", "true");
          window.location.href = "./admin.html";
        } else {
          alert("Wrong login");
        }
      });
    </script>
  </body>
</html>
